name: Auto-update dashboard

on:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours
  workflow_dispatch:          # also allows manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Anthropic SDK
        run: pip install anthropic

      - name: Run update script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python update_dashboard.py

      - name: Commit updated dashboard
        run: |
          git config user.name "TRC Dashboard Bot"
          git config user.email "bot@trcresearchcollective.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update: dashboard data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
